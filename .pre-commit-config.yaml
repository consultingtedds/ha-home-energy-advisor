# Pre-commit hooks must be fast, so this is ruff + hygiene only.
#
# mypy and pytest are deliberately NOT here. Both need the full Home Assistant
# environment: mypy needs HA's types (installing HA into pre-commit's isolated
# env takes minutes on Windows), and pytest dies at collection on native Windows
# because HA imports fcntl. Both are enforced authoritatively in CI (Linux, full
# env) and via the manual WSL gate in docs/CRITICAL_INSTRUCTIONS.md, which must be
# run before pushing.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
