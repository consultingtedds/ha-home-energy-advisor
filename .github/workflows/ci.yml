name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# SonarQube is deliberately absent: it is a local pre-commit gate only, so that
# contributors without access to the server are never blocked. See
# docs/CRITICAL_INSTRUCTIONS.md.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.14"

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install ruff
        run: pip install -r requirements_test.txt
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements_test.txt
      - name: Type check
        run: mypy custom_components tests

  test:
    name: pytest (HA ${{ matrix.ha-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # One entry while the supported floor is the latest release. Adding an
        # older floor means adding its matching phacc pin here — phacc hard-pins
        # the Home Assistant version it tests against.
        include:
          - ha-version: "2026.7.2"
            phacc: "0.13.346"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements_test.txt
          pip install "pytest-homeassistant-custom-component==${{ matrix.phacc }}"
      - name: Test
        run: pytest --cov --cov-fail-under=90

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # The brands check requires an accepted PR against home-assistant/brands,
          # which is deferred until the integration is submitted to the HACS
          # default store.
          ignore: brands

  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
