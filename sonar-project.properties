sonar.projectKey=ha-home-energy-advisor
sonar.projectName=Home Energy Advisor

sonar.sources=custom_components
sonar.tests=tests

sonar.python.version=3.14
sonar.python.coverage.reportPaths=coverage.xml

sonar.sourceEncoding=UTF-8

# Captured real-instance data, not source.
sonar.exclusions=tests/fixtures/**

# Home Assistant platform contract: a platform hook such as
# async_setup_entry(hass, entry, async_add_entities) or
# async_get_config_entry_diagnostics(hass, entry) is awaited by HA, so it must be
# `async` even when its body only calls synchronous helpers (S7503); and HA
# invokes it positionally, so `hass` must stay in the signature even when unused
# (S1172). Both are unavoidable false positives on these framework hooks.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.e1.resourceKey=**/sensor.py
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S1172
sonar.issue.ignore.multicriteria.e2.resourceKey=**/sensor.py
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.e3.resourceKey=**/diagnostics.py
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S1172
sonar.issue.ignore.multicriteria.e4.resourceKey=**/diagnostics.py
