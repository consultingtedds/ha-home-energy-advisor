sonar.projectKey=ha-home-energy-advisor
sonar.projectName=Home Energy Advisor

sonar.sources=custom_components
sonar.tests=tests

sonar.python.version=3.14
sonar.python.coverage.reportPaths=coverage.xml

sonar.sourceEncoding=UTF-8

# Captured real-instance data, not source.
sonar.exclusions=tests/fixtures/**

# Home Assistant platform contract: a platform's async_setup_entry(hass, entry,
# async_add_entities) is awaited by HA, so it must be `async` even when its body
# only calls the synchronous async_add_entities (S7503); and HA invokes it
# positionally, so `hass` must stay in the signature even when unused (S1172).
# Both are unavoidable false positives on every platform's setup hook.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.e1.resourceKey=**/sensor.py
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S1172
sonar.issue.ignore.multicriteria.e2.resourceKey=**/sensor.py
